<svg fill="none" width="100%" height="320" viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;family=DM+Mono:wght@400;500&amp;display=swap');
        
        .container {
          width: 100%;
          max-width: 760px;
          height: 320px;
          box-sizing: border-box;
          margin: 0 auto;
          position: relative;
          overflow: hidden;
          border: 1px solid rgba(255,255,255,0.05);
          border-radius: 28px;
          padding: 50px 60px;
          box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 30px 80px rgba(0,0,0,0.55);
          background: radial-gradient(ellipse 500px 240px at 100% 0%, rgba(172,108,18,0.10), transparent 65%), radial-gradient(ellipse 300px 300px at 0% 100%, rgba(50,90,120,0.08), transparent 70%), linear-gradient(145deg, #0e0e10 0%, #09090b 45%, #070708 100%);
        }
        .grid-bg {
          position: absolute;
          inset: 0;
          z-index: 0;
          opacity: 0.04;
          background-image: linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
          background-size: 36px 36px;
          pointer-events: none;
        }
        .glow {
          position: absolute;
          top: -120px;
          right: -120px;
          width: 320px;
          height: 320px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(172,108,18,0.15) 0%, transparent 70%);
          z-index: 0;
          pointer-events: none;
        }
        .accent-line {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 1px;
          z-index: 3;
          background: linear-gradient(90deg, transparent 0%, rgba(172,108,18,0.00) 15%, rgba(172,108,18,0.50) 50%, rgba(172,108,18,0.00) 85%, transparent 100%);
          pointer-events: none;
        }
        .content {
          position: relative;
          z-index: 5;
        }
        .header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          flex-wrap: wrap;
          gap: 20px;
          margin-bottom: 20px;
        }
        .title {
          font-family: 'Cormorant Garamond', 'Cormorant', 'Georgia', 'Times New Roman', serif;
          font-size: 64px;
          line-height: 0.9;
          letter-spacing: -2px;
          font-weight: 200;
          color: #f5f1ea;
          margin: 0;
        }
        .title-italic {
          font-style: italic;
          font-weight: 300;
          color: #c98b38;
        }
        .badge {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 6px 14px;
          border-radius: 999px;
          background: linear-gradient(135deg, rgba(201,139,56,0.08) 0%, rgba(255,255,255,0.02) 100%);
          border: 1px solid rgba(201,139,56,0.22);
          font-family: 'DM Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
          font-size: 10px;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #ffe8cc;
          text-shadow: 0 0 8px rgba(201,139,56,0.3);
          margin-top: 8px;
        }
        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #ffb300;
          box-shadow: 0 0 8px #ffb300, 0 0 16px rgba(255,179,0,0.6);
          display: inline-block;
          margin-right: 4px;
        }
        .divider {
          width: 64px;
          height: 1px;
          margin-bottom: 24px;
          position: relative;
          background: linear-gradient(90deg, rgba(172,108,18,0.8), transparent);
        }
        .divider-radial {
          position: absolute;
          left: 0;
          top: -2px;
          width: 32px;
          height: 5px;
          background: radial-gradient(ellipse at left, rgba(172,108,18,0.28), transparent 70%);
        }
        .desc {
          max-width: 540px;
          font-family: -apple-system, BlinkMacSystemFont, 'Geist', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          font-size: 15px;
          line-height: 1.8;
          color: rgba(205,198,190,0.66);
          font-weight: 300;
          letter-spacing: 0.01em;
          margin: 0;
        }
        .desc-strong {
          color: rgba(255,250,240,0.92);
          font-weight: 400;
        }
      </style>
      <div class="container">
        <div class="grid-bg"></div>
        <div class="glow"></div>
        <div class="accent-line"></div>
        <div class="content">
          <div class="header">
            <h1 class="title">
              Huy<br />
              <span class="title-italic">Tran</span>
            </h1>
            <div class="badge">
              <span class="dot"></span>
              Android Engineer
            </div>
          </div>
          <div class="divider">
            <div class="divider-radial"></div>
          </div>
          <p class="desc">
            Crafting <strong class="desc-strong">modern Android experiences</strong> focused on clean architecture, scalable systems, and performance-driven mobile applications.
          </p>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
