name: GitHub Metrics

on:
  # Schedule daily updates (at 00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  # Trigger on push to the main/master branch
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Profile Metrics
        uses: lowighter/metrics@latest
        with:
          # Your GitHub Personal Access Token (PAT) with appropriate permissions.
          # Add it to your repository secrets as METRICS_TOKEN.
          # Note: GITHUB_TOKEN can be used for basic metrics, but PAT is required for full metrics.
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: your-username
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: UTC
          
          # Plugin: Languages
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Plugin: Habits (Coding schedules/habits)
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Plugin: Lines of Code
          plugin_lines: yes
