name: Generate Contribution Snake Animation

on:
  schedule:
    # Run every 12 hours
    - cron: "0 */12 * * *"
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:
  
  # Run on push to main branch
  push:
    branches:
      - main
      - master
      - feature/fix-metrics-and-hero

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Generates a game of snake from a github user's contributions graph, outputting SVG animations
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: huytran2005
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=%23C8A96B
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23C8A96B
            
      # Push the content of <build_dir> to the target branch
      - name: Push github-contribution-grid-snake.svg to the Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
